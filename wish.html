<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حصالة الأمنيات ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wish-box-container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }

            70% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        .wish-input-area {
            background: var(--glass-heavy);
            backdrop-filter: blur(30px);
            border: 2px dashed var(--glass-border);
            border-radius: 40px;
            padding: 50px 30px;
            margin-top: 30px;
            position: relative;
            transition: 0.4s;
        }

        .wish-input-area:focus-within {
            border-style: solid;
            border-color: var(--primary-light);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.2);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 700;
            outline: none;
            resize: none;
            min-height: 150px;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
        }

        .save-wish-btn {
            margin-top: 40px;
            padding: 20px 50px;
            font-size: 1.4rem;
            border-radius: 50px;
            background: linear-gradient(135deg, #7209b7, #ff4d6d);
            border: none;
            color: white;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(114, 9, 183, 0.4);
            transition: 0.3s;
        }

        .save-wish-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(114, 9, 183, 0.6);
        }

        .floating-stars-inner {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            animation: spin 3s infinite linear;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="wish-box-container">
        <div class="heart-main">✨🏺</div>
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">حصالة الأمنيات ❤️</h1>
        <p style="color: #ffb3c1; font-size: 1.2rem;">اكتبي أمنية نفسك نحققها سوا في المستقبل.. <br>هخبيها في قلبي وفي
            الموقع هنا لحد ما نحققها</p>

        <div class="wish-input-area">
            <div class="floating-stars-inner">✨</div>
            <form id="wishForm">
                <textarea id="wishText" placeholder="نفسي إننا..." required></textarea>
                <button type="submit" class="save-wish-btn" id="saveBtn">احفظ الأمنية في السحاب ☁️</button>
            </form>
        </div>

        <div id="successMsg"
            style="display:none; margin-top: 30px; font-size: 1.5rem; color: #fff; animation: fadeIn 1s;">
            تم حفظ أمنيتك يا جميلتي.. <br>هنوصل ليها سوا إن شاء الله ❤️
            <br>
            <button onclick="window.location.href='love.html'" style="margin-top: 20px; max-width: 300px;">أخر حاجة..
                😍</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.getElementById('wishForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const wish = document.getElementById('wishText').value;

            btn.innerHTML = 'جاري الحفظ في السحاب... ✨';
            btn.disabled = true;

            try {
                await addDoc(collection(db, "wishes"), {
                    content: wish,
                    createdAt: serverTimestamp()
                });

                document.getElementById('wishForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            } catch (error) {
                console.error("Error saving wish: ", error);
                alert("حدث خطأ أثناء الحفظ، تأكد من إعدادات Firebase");
                btn.disabled = false;
                btn.innerHTML = 'احفظ الأمنية في السحاب ☁️';
            }
        });
    </script>
</body>

</html>
