<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ام العيال ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: block;
            padding: 40px 0;
        }
    </style>
</head>

<body>
    <div class="glass-container"
        style="max-width: 1100px; padding: 4rem 2rem; margin: 40px auto; overflow: visible; display: block;">
        <div class="heart-main">📸</div>
        <h1>ام العيال ❤️</h1>
        <p>كل لحظة معكِ هي حكاية .. <br> </p>

        <div class="gallery" id="imageGallery">
            <div class="gallery-item"><img src="WhatsApp Image 2026-03-06 at 6.35.40 AM (1).jpeg" alt="ذكرى 1"></div>
            <div class="gallery-item"><img src="WhatsApp Image 2026-03-06 at 6.35.40 AM (2).jpeg" alt="ذكرى 2"></div>
            <div class="gallery-item"><img src="WhatsApp Image 2026-03-06 at 6.35.40 AM (3).jpeg" alt="ذكرى 3"></div>
            <div class="gallery-item"><img src="WhatsApp Image 2026-03-06 at 6.35.40 AM (4).jpeg" alt="ذكرى 4"></div>
            <div class="gallery-item"><img src="WhatsApp Image 2026-03-06 at 6.35.40 AM (5).jpeg" alt="ذكرى 5"></div>
            <div class="gallery-item"><img src="WhatsApp Image 2026-03-06 at 6.35.40 AM.jpeg" alt="ذكرى 6"></div>
        </div>

        <div style="margin-top: 60px; text-align: center;">
            <p style="font-size: 1.2rem;">لسه حكايتنا مستمرة في الصفحة الجاية.. 😍</p>
            <button onclick="window.location.href='timeline.html'" style="max-width: 350px; margin: 20px auto;">أرقامنا
                سوا ❤️</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.gallery-item').forEach(item => {
            observer.observe(item);
        });
    </script>
</body>

</html>
